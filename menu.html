<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Induction - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --text-main: #666666;
            --text-soft: #8a8a8a;
            --text-light: #b5b5b5;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-hover: rgba(255, 255, 255, 0.28);
            --accent-a: rgba(100, 150, 255, 0.4);
            --accent-b: rgba(150, 100, 255, 0.3);
            --accent-a-strong: rgba(100, 150, 255, 0.5);
            --accent-b-strong: rgba(150, 100, 255, 0.4);
        }

        body {
            width: 100%;
            min-height: 100vh;
            background: #ffffff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
            color: var(--text-main);
        }

        .bg-blur {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: 1;
            pointer-events: none;
        }

        .blur-1 {
            width: 420px;
            height: 420px;
            background: rgba(100, 150, 255, 0.2);
            top: -140px;
            left: -100px;
        }

        .blur-2 {
            width: 360px;
            height: 360px;
            background: rgba(150, 100, 255, 0.15);
            bottom: -90px;
            right: -60px;
        }

        .page {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            padding: 24px;
        }

        .layout {
            width: 100%;
            min-height: calc(100vh - 48px);
            display: flex;
            gap: 20px;
        }

        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .sidebar {
            width: 280px;
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.6s ease-out;
        }

        .brand {
            padding: 8px 10px 22px;
        }

        .brand h1 {
            font-size: 1.5rem;
            line-height: 1.1;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .brand p {
            margin-top: 8px;
            font-size: 0.9rem;
            color: var(--text-soft);
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-btn {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
            color: var(--text-main);
            border-radius: 14px;
            padding: 14px 16px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, var(--accent-a-strong), var(--accent-b-strong));
            box-shadow: 0 4px 15px rgba(100, 150, 255, 0.2);
            transform: translateY(-2px);
        }

        .menu-btn:active {
            transform: translateY(0);
        }

        .menu-btn.active {
            background: rgba(255, 255, 255, 0.32);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
        }

        .menu-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
        }

        .content {
            flex: 1;
            padding: 20px;
            animation: slideUp 0.7s ease-out;
        }

        .empty-main {
            width: 100%;
            height: 100%;
            min-height: calc(100vh - 88px);
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.08);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            body {
                overflow: auto;
            }

            .layout {
                flex-direction: column;
                min-height: auto;
            }

            .sidebar {
                width: 100%;
            }

            .content {
                min-height: 420px;
            }

            .empty-main {
                min-height: 420px;
            }
        }

        @media (max-width: 480px) {
            .page {
                padding: 16px;
            }

            .sidebar,
            .content {
                padding: 18px;
            }

            .brand h1 {
                font-size: 1.3rem;
            }

            .menu-btn {
                padding: 13px 14px;
                font-size: 0.92rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>

    <main class="page">
        <section class="layout">
            <aside class="sidebar glass-panel">
                <div class="brand">
                    <h1>Induction</h1>
                    <p>Navigation</p>
                </div>

                <nav class="menu" aria-label="Sidebar menu">
                    <button class="menu-btn active" type="button">
                        <span class="menu-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 10.5 12 3l9 7.5"></path>
                                <path d="M5 9.5V21h14V9.5"></path>
                            </svg>
                        </span>
                        <span>Induction</span>
                    </button>

                    <button class="menu-btn" type="button">
                        <span class="menu-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M6 3h9l3 3v15H6z"></path>
                                <path d="M15 3v3h3"></path>
                                <path d="M9 12h6"></path>
                                <path d="M9 16h6"></path>
                            </svg>
                        </span>
                        <span>Workbook</span>
                    </button>

                    <button class="menu-btn" type="button">
                        <span class="menu-icon" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15a4 4 0 0 1-4 4H8l-5 2 2-5V7a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4z"></path>
                            </svg>
                        </span>
                        <span>Feedback</span>
                    </button>
                </nav>
            </aside>

            <section class="content glass-panel" aria-label="Main content">
                <div class="empty-main"></div>
            </section>
        </section>
    </main>
</body>
</html>
